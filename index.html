<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Calculator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="calculator-container">
        <div class="theme-switcher">
            <button class="theme-btn active" data-theme="midnight" title="Midnight"></button>
            <button class="theme-btn" data-theme="sunset" title="Sunset"></button>
            <button class="theme-btn" data-theme="cyberpunk" title="Cyberpunk"></button>
            <button class="theme-btn" data-theme="glacial" title="Glacial"></button>
        </div>
        <div class="calculator-screen">
            <div class="expression" id="expression"></div>
            <div class="result" id="result">0</div>
        </div>
        <div class="calculator-keypad">
            <button class="key action-secondary" data-action="clear">AC</button>
            <button class="key action-secondary" data-action="delete">DEL</button>
            <button class="key action-secondary" data-action="percent">%</button>
            <button class="key operator" data-action="divide">÷</button>
            
            <button class="key number" data-num="7">7</button>
            <button class="key number" data-num="8">8</button>
            <button class="key number" data-num="9">9</button>
            <button class="key operator" data-action="multiply">×</button>
            
            <button class="key number" data-num="4">4</button>
            <button class="key number" data-num="5">5</button>
            <button class="key number" data-num="6">6</button>
            <button class="key operator" data-action="subtract">-</button>
            
            <button class="key number" data-num="1">1</button>
            <button class="key number" data-num="2">2</button>
            <button class="key number" data-num="3">3</button>
            <button class="key operator" data-action="add">+</button>
            
            <button class="key number zero-key" data-num="0">0</button>
            <button class="key number" data-num=".">.</button>
            <button class="key action-primary" data-action="calculate">=</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
